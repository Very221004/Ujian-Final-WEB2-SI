<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Product CRUD</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            200: '#bbf7d0',
                            300: '#86efac',
                            400: '#4ade80',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                            800: '#166534',
                            900: '#14532d',
                            950: '#052e16',
                        },
                        dark: {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            200: '#e2e8f0',
                            300: '#cbd5e1',
                            400: '#94a3b8',
                            500: '#64748b',
                            600: '#475569',
                            700: '#334155',
                            800: '#1e293b',
                            900: '#0f172a',
                            950: '#020617',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-primary-950 via-primary-900 to-dark-900 flex items-center justify-center p-4">

<!-- Background Pattern -->
<div class="fixed inset-0 opacity-10">
    <div class="absolute inset-0" style="background-image: url('data:image/svg+xml,%3Csvg width=\'60\' height=\'60\' viewBox=\'0 0 60 60\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cg fill=\'none\' fill-rule=\'evenodd\'%3E%3Cg fill=\'%23ffffff\' fill-opacity=\'0.4\'%3E%3Cpath d=\'M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z\'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E');"></div>
</div>

<div class="relative z-10 w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-white/10 rounded-2xl mb-4 backdrop-blur-sm">
            <i data-lucide="package" class="w-8 h-8 text-white"></i>
        </div>
        <h1 class="text-3xl font-bold text-white">ProductCRUD</h1>
        <p class="text-primary-200 mt-2">Masuk ke akun Anda</p>
    </div>

    <!-- Login Card -->
    <div class="bg-white/10 backdrop-blur-xl rounded-3xl p-8 shadow-2xl border border-white/10">

        <!-- Error Message -->
        <div th:if="${param.error}" class="mb-6 p-4 bg-red-500/20 border border-red-400/30 rounded-xl">
            <div class="flex items-center space-x-3">
                <i data-lucide="alert-circle" class="w-5 h-5 text-red-300 flex-shrink-0"></i>
                <p class="text-sm text-red-200">Username atau password salah!</p>
            </div>
        </div>

        <!-- Logout Message -->
        <div th:if="${param.logout}" class="mb-6 p-4 bg-blue-500/20 border border-blue-400/30 rounded-xl">
            <div class="flex items-center space-x-3">
                <i data-lucide="info" class="w-5 h-5 text-blue-300 flex-shrink-0"></i>
                <p class="text-sm text-blue-200">Berhasil logout.</p>
            </div>
        </div>

        <!-- Success Message -->
        <div th:if="${success}" class="mb-6 p-4 bg-green-500/20 border border-green-400/30 rounded-xl">
            <div class="flex items-center space-x-3">
                <i data-lucide="check-circle" class="w-5 h-5 text-green-300 flex-shrink-0"></i>
                <p class="text-sm text-green-200" th:text="${success}"></p>
            </div>
        </div>

        <!-- Login Form -->
        <form th:action="@{/login}" method="post" class="space-y-5">
            <!-- Username -->
            <div>
                <label for="username" class="block text-sm font-medium text-white/80 mb-2">Username</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i data-lucide="user" class="w-5 h-5 text-white/40"></i>
                    </div>
                    <input type="text" id="username" name="username"
                           placeholder="Masukkan username" required autofocus
                           class="w-full pl-12 pr-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-primary-400 focus:border-transparent transition-all duration-200">
                </div>
            </div>

            <!-- Password -->
            <div>
                <label for="password" class="block text-sm font-medium text-white/80 mb-2">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i data-lucide="lock" class="w-5 h-5 text-white/40"></i>
                    </div>
                    <input type="password" id="password" name="password"
                           placeholder="Masukkan password" required
                           class="w-full pl-12 pr-12 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-primary-400 focus:border-transparent transition-all duration-200">
                    <button type="button" onclick="togglePassword('password', 'toggleIcon')" class="absolute inset-y-0 right-0 pr-4 flex items-center text-white/40 hover:text-white/60">
                        <i data-lucide="eye" id="toggleIcon" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

            <!-- Login Button -->
            <button type="submit" class="w-full py-3.5 bg-primary-600 hover:bg-primary-500 text-white font-semibold rounded-xl shadow-lg shadow-primary-900/50 hover:shadow-primary-800/50 transform hover:-translate-y-0.5 transition-all duration-200 flex items-center justify-center space-x-2">
                <span>Masuk</span>
                <i data-lucide="arrow-right" class="w-5 h-5"></i>
            </button>
        </form>

        <!-- Register Link -->
        <div class="mt-6 text-center">
            <p class="text-white/60 text-sm">
                Belum punya akun?
                <a th:href="@{/register}" class="text-primary-300 hover:text-primary-200 font-medium hover:underline transition-colors">
                    Daftar di sini
                </a>
            </p>
        </div>
    </div>

    <!-- Footer Text -->
    <p class="text-center text-white/30 text-xs mt-6">
        Praktikum JPA Fundamentals - 2026
    </p>
</div>

<script>
    lucide.createIcons();

    function togglePassword(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);

        if (input.type === 'password') {
            input.type = 'text';
            icon.setAttribute('data-lucide', 'eye-off');
        } else {
            input.type = 'password';
            icon.setAttribute('data-lucide', 'eye');
        }
        lucide.createIcons();
    }
</script>
</body>
</html>
