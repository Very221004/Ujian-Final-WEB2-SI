<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}"></head>
<body class="bg-gray-50 min-h-screen flex flex-col">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex-1 w-full">

    <!-- Header -->
    <div class="mb-8">
        <a th:href="@{/categories}" class="inline-flex items-center space-x-2 text-gray-500 hover:text-primary-700 transition-colors mb-4">
            <i data-lucide="arrow-left" class="w-4 h-4"></i>
            <span class="text-sm font-medium">Kembali ke Daftar Kategori</span>
        </a>
        <h1 class="text-2xl font-bold text-gray-900">
            <i data-lucide="tag" class="w-6 h-6 inline mr-2 text-primary-700"></i>
            <span th:text="${isEdit} ? 'Edit Kategori' : 'Tambah Kategori Baru'">Form Kategori</span>
        </h1>
    </div>

    <div th:if="${success}" class="mb-6 p-4 bg-green-50 border border-green-200 rounded-xl">
        <div class="flex items-center space-x-3">
            <i data-lucide="check-circle" class="w-5 h-5 text-green-600 flex-shrink-0"></i>
            <p class="text-sm text-green-700" th:text="${success}"></p>
        </div>
    </div>

    <div th:if="${error}" class="mb-6 p-4 bg-red-50 border border-red-200 rounded-xl">
        <div class="flex items-center space-x-3">
            <i data-lucide="alert-circle" class="w-5 h-5 text-red-600 flex-shrink-0"></i>
            <p class="text-sm text-red-700" th:text="${error}"></p>
        </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
        <form th:action="@{/categories/save}" th:object="${categoryRequest}" method="post" class="space-y-6">

            <!-- Hidden ID for edit -->
            <input type="hidden" name="id" th:value="${categoryId}">

            <div>
                <label for="name" class="block text-sm font-medium text-gray-700 mb-2">
                    Nama Kategori <span class="text-red-500">*</span>
                </label>
                <input type="text" id="name" th:field="*{name}"
                       placeholder="Masukkan nama kategori" required autofocus
                       class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all duration-200">
                <p class="mt-2 text-sm text-gray-400">Contoh: Elektronik, Makanan, Pakaian, dll.</p>
            </div>


            <div>
                <label for="description" class="block text-sm font-medium text-gray-700 mb-2">
                    Deskripsi <span class="text-gray-400 font-normal">(opsional)</span>
                </label>
                <textarea id="description" th:field="*{description}" rows="4"
                          placeholder="Masukkan deskripsi kategori"
                          class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all duration-200 resize-none"></textarea>
            </div>

            <!-- Buttons -->
            <div class="flex items-center space-x-4 pt-4 border-t border-gray-100">
                <button type="submit" class="inline-flex items-center space-x-2 px-6 py-3 bg-primary-700 hover:bg-primary-600 text-white font-medium rounded-xl shadow-sm hover:shadow-md transition-all duration-200">
                    <i data-lucide="save" class="w-5 h-5"></i>
                    <span th:text="${isEdit} ? 'Simpan Perubahan' : 'Tambah Kategori'">Simpan</span>
                </button>
                <a th:href="@{/categories}" class="inline-flex items-center space-x-2 px-6 py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium rounded-xl transition-all duration-200">
                    <span>Kembali</span>
                </a>
            </div>
        </form>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script>
    setTimeout(() => lucide.createIcons(), 100);
</script>
</body>
</html>
