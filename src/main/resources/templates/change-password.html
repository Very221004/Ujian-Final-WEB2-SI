<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}"></head>
<body class="bg-gray-50 min-h-screen flex flex-col">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="max-w-xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex-1 w-full">

    <!-- Header -->
    <div class="mb-8">
        <a th:href="@{/profile}" class="inline-flex items-center space-x-2 text-gray-500 hover:text-primary-700 transition-colors mb-4">
            <i data-lucide="arrow-left" class="w-4 h-4"></i>
            <span class="text-sm font-medium">Kembali ke Profile</span>
        </a>
        <h1 class="text-2xl font-bold text-gray-900 flex items-center space-x-3">
            <i data-lucide="key-round" class="w-7 h-7 text-primary-700"></i>
            <span>Change Password</span>
        </h1>
    </div>

    <!-- Alert Messages -->
    <div th:if="${error}" class="mb-6 p-4 bg-red-50 border border-red-200 rounded-xl">
        <div class="flex items-center space-x-3">
            <i data-lucide="alert-circle" class="w-5 h-5 text-red-600 flex-shrink-0"></i>
            <p class="text-sm text-red-700" th:text="${error}"></p>
        </div>
    </div>

    <div th:if="${success}" class="mb-6 p-4 bg-green-50 border border-green-200 rounded-xl">
        <div class="flex items-center space-x-3">
            <i data-lucide="check-circle" class="w-5 h-5 text-green-600 flex-shrink-0"></i>
            <p class="text-sm text-green-700" th:text="${success}"></p>
        </div>
    </div>

    <!-- Form Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
        <form th:action="@{/change-password}" th:object="${changePasswordRequest}" method="post" class="space-y-6">

            <!-- Current Password -->
            <div>
                <label for="currentPassword" class="block text-sm font-medium text-gray-700 mb-2">
                    <i data-lucide="lock" class="w-4 h-4 inline mr-1"></i>
                    Password Lama <span class="text-red-500">*</span>
                </label>
                <div class="relative">
                    <input type="password" id="currentPassword"
                           th:field="*{currentPassword}"
                           placeholder="Masukkan password lama" required
                           class="w-full px-4 pr-12 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all duration-200">
                    <button type="button" onclick="togglePassword('currentPassword', 'currentIcon')" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-gray-600">
                        <i data-lucide="eye" id="currentIcon" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

            <!-- New Password -->
            <div>
                <label for="newPassword" class="block text-sm font-medium text-gray-700 mb-2">
                    <i data-lucide="lock" class="w-4 h-4 inline mr-1"></i>
                    Password Baru <span class="text-red-500">*</span>
                </label>
                <div class="relative">
                    <input type="password" id="newPassword"
                           th:field="*{newPassword}"
                           placeholder="Masukkan password baru" required
                           class="w-full px-4 pr-12 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all duration-200">
                    <button type="button" onclick="togglePassword('newPassword', 'newIcon')" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-gray-600">
                        <i data-lucide="eye" id="newIcon" class="w-5 h-5"></i>
                    </button>
                </div>
                <p class="mt-2 text-sm text-gray-400">Minimal 6 karakter</p>

                <!-- Password Strength Indicator -->
                <div class="mt-3">
                    <div class="h-2 bg-gray-100 rounded-full overflow-hidden">
                        <div id="passwordStrength" class="h-full rounded-full transition-all duration-300" style="width: 0%; background-color: #e5e7eb;"></div>
                    </div>
                    <p id="passwordStrengthText" class="text-xs mt-1.5 text-gray-400"></p>
                </div>
            </div>

            <!-- Confirm New Password -->
            <div>
                <label for="confirmNewPassword" class="block text-sm font-medium text-gray-700 mb-2">
                    <i data-lucide="lock" class="w-4 h-4 inline mr-1"></i>
                    Konfirmasi Password Baru <span class="text-red-500">*</span>
                </label>
                <div class="relative">
                    <input type="password" id="confirmNewPassword"
                           th:field="*{confirmNewPassword}"
                           placeholder="Ulangi password baru" required
                           class="w-full px-4 pr-12 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all duration-200">
                    <button type="button" onclick="togglePassword('confirmNewPassword', 'confirmIcon')" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-gray-600">
                        <i data-lucide="eye" id="confirmIcon" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

            <!-- Buttons -->
            <div class="flex items-center space-x-4 pt-4 border-t border-gray-100">
                <button type="submit" class="inline-flex items-center space-x-2 px-6 py-3 bg-primary-700 hover:bg-primary-600 text-white font-medium rounded-xl shadow-sm hover:shadow-md transition-all duration-200">
                    <i data-lucide="save" class="w-5 h-5"></i>
                    <span>Ubah Password</span>
                </button>
                <a th:href="@{/profile}" class="inline-flex items-center space-x-2 px-6 py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium rounded-xl transition-all duration-200">
                    <span>Batal</span>
                </a>
            </div>
        </form>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script>
    setTimeout(() => lucide.createIcons(), 100);

    // Toggle password visibility
    function togglePassword(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);

        if (input.type === 'password') {
            input.type = 'text';
            icon.setAttribute('data-lucide', 'eye-off');
        } else {
            input.type = 'password';
            icon.setAttribute('data-lucide', 'eye');
        }
        lucide.createIcons();
    }

    // Password strength checker
    const newPasswordInput = document.getElementById('newPassword');
    const strengthBar = document.getElementById('passwordStrength');
    const strengthText = document.getElementById('passwordStrengthText');

    newPasswordInput.addEventListener('input', function() {
        const password = this.value;
        let strength = 0;
        let text = '';
        let color = '';

        if (password.length >= 6) strength++;
        if (password.length >= 10) strength++;
        if (/[A-Z]/.test(password)) strength++;
        if (/[0-9]/.test(password)) strength++;
        if (/[^A-Za-z0-9]/.test(password)) strength++;

        switch(strength) {
            case 0:
                text = '';
                color = '#e5e7eb';
                strength = 0;
                break;
            case 1:
                text = 'Sangat Lemah';
                color = '#ef4444';
                strength = 20;
                break;
            case 2:
                text = 'Lemah';
                color = '#f59e0b';
                strength = 40;
                break;
            case 3:
                text = 'Sedang';
                color = '#3b82f6';
                strength = 60;
                break;
            case 4:
                text = 'Kuat';
                color = '#22c55e';
                strength = 80;
                break;
            case 5:
                text = 'Sangat Kuat';
                color = '#14532d';
                strength = 100;
                break;
        }

        strengthBar.style.width = strength + '%';
        strengthBar.style.backgroundColor = color;
        strengthText.textContent = text;
        strengthText.style.color = color === '#e5e7eb' ? '#9ca3af' : color;
    });

    // Client-side validation before submit
    document.querySelector('form').addEventListener('submit', function(e) {
        const newPassword = document.getElementById('newPassword').value;
        const confirmNewPassword = document.getElementById('confirmNewPassword').value;

        if (newPassword.length < 6) {
            e.preventDefault();
            alert('Password baru minimal 6 karakter!');
            return;
        }

        if (newPassword !== confirmNewPassword) {
            e.preventDefault();
            alert('Password baru dan konfirmasi password tidak cocok!');
            return;
        }
    });
</script>
</body>
</html>
