<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div class="row justify-content-center mt-4">
        <div class="col-md-6">

            <h3 class="mb-4">
                <i class="bi bi-key me-2"></i>Change Password
            </h3>

            <!-- Error Message -->
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                <i class="bi bi-exclamation-circle me-2"></i>
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Success Message -->
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
                <i class="bi bi-check-circle me-2"></i>
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card shadow">
                <div class="card-body">
                    <form th:action="@{/change-password}" th:object="${changePasswordRequest}" method="post">

                        <!-- Current Password -->
                        <div class="mb-3">
                            <label for="currentPassword" class="form-label">
                                <i class="bi bi-lock me-1"></i>Password Lama <span class="text-danger">*</span>
                            </label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="currentPassword"
                                       th:field="*{currentPassword}"
                                       placeholder="Masukkan password lama" required>
                                <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('currentPassword', this)">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>

                        <!-- New Password -->
                        <div class="mb-3">
                            <label for="newPassword" class="form-label">
                                <i class="bi bi-lock-fill me-1"></i>Password Baru <span class="text-danger">*</span>
                            </label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="newPassword"
                                       th:field="*{newPassword}"
                                       placeholder="Masukkan password baru" required>
                                <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('newPassword', this)">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                            <div class="form-text">Minimal 6 karakter</div>
                        </div>

                        <!-- Confirm New Password -->
                        <div class="mb-3">
                            <label for="confirmNewPassword" class="form-label">
                                <i class="bi bi-lock-fill me-1"></i>Konfirmasi Password Baru <span class="text-danger">*</span>
                            </label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="confirmNewPassword"
                                       th:field="*{confirmNewPassword}"
                                       placeholder="Ulangi password baru" required>
                                <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('confirmNewPassword', this)">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Password Strength Indicator -->
                        <div class="mb-3">
                            <div class="progress" style="height: 8px;">
                                <div id="passwordStrength" class="progress-bar" role="progressbar"
                                     style="width: 0%"></div>
                            </div>
                            <small id="passwordStrengthText" class="text-muted"></small>
                        </div>

                        <!-- Buttons -->
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle me-1"></i>Ubah Password
                            </button>
                            <a th:href="@{/profile}" class="btn btn-secondary">
                                <i class="bi bi-arrow-left me-1"></i>Kembali ke Profile
                            </a>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script>
    // Toggle password visibility
    function togglePassword(inputId, button) {
        const input = document.getElementById(inputId);
        const icon = button.querySelector('i');

        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('bi-eye');
            icon.classList.add('bi-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('bi-eye-slash');
            icon.classList.add('bi-eye');
        }
    }

    // Password strength checker
    const newPasswordInput = document.getElementById('newPassword');
    const strengthBar = document.getElementById('passwordStrength');
    const strengthText = document.getElementById('passwordStrengthText');

    newPasswordInput.addEventListener('input', function() {
        const password = this.value;
        let strength = 0;
        let text = '';
        let color = '';

        if (password.length >= 6) strength++;
        if (password.length >= 10) strength++;
        if (/[A-Z]/.test(password)) strength++;
        if (/[0-9]/.test(password)) strength++;
        if (/[^A-Za-z0-9]/.test(password)) strength++;

        switch(strength) {
            case 0:
                text = '';
                color = '';
                strength = 0;
                break;
            case 1:
                text = 'Sangat Lemah';
                color = 'bg-danger';
                strength = 20;
                break;
            case 2:
                text = 'Lemah';
                color = 'bg-warning';
                strength = 40;
                break;
            case 3:
                text = 'Sedang';
                color = 'bg-info';
                strength = 60;
                break;
            case 4:
                text = 'Kuat';
                color = 'bg-success';
                strength = 80;
                break;
            case 5:
                text = 'Sangat Kuat';
                color = 'bg-success';
                strength = 100;
                break;
        }

        strengthBar.style.width = strength + '%';
        strengthBar.className = 'progress-bar ' + color;
        strengthText.textContent = text;
    });

    // Client-side validation before submit
    document.querySelector('form').addEventListener('submit', function(e) {
        const newPassword = document.getElementById('newPassword').value;
        const confirmNewPassword = document.getElementById('confirmNewPassword').value;

        if (newPassword.length < 6) {
            e.preventDefault();
            alert('Password baru minimal 6 karakter!');
            return;
        }

        if (newPassword !== confirmNewPassword) {
            e.preventDefault();
            alert('Password baru dan konfirmasi password tidak cocok!');
            return;
        }
    });
</script>

</body>
</html>
