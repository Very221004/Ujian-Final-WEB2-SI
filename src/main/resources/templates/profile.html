<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}"></head>
<body class="bg-gray-50 min-h-screen flex flex-col">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex-1 w-full">

    <!-- Success Message -->
    <div th:if="${success}" class="mb-6 p-4 bg-green-50 border border-green-200 rounded-xl">
        <div class="flex items-center space-x-3">
            <i data-lucide="check-circle" class="w-5 h-5 text-green-600 flex-shrink-0"></i>
            <p class="text-sm text-green-700" th:text="${success}"></p>
        </div>
    </div>

    <!-- Profile Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">

        <!-- Header -->
        <div class="gradient-primary px-8 py-6">
            <div class="flex items-center space-x-3">
                <i data-lucide="user-circle" class="w-6 h-6 text-white"></i>
                <h1 class="text-xl font-semibold text-white">User Profile</h1>
            </div>
        </div>

        <div class="p-8">
            <div class="flex flex-col md:flex-row gap-8">

                <!-- Profile Image -->
                <div class="flex flex-col items-center">
                    <div class="w-44 h-44 rounded-2xl overflow-hidden shadow-lg border-4 border-white">
                        <img th:if="${user.profileImageUrl != null && !user.profileImageUrl.isEmpty()}"
                             th:src="${user.profileImageUrl}"
                             class="w-full h-full object-cover"
                             alt="Profile"
                             onerror="this.src='https://ui-avatars.com/api/?name=U&background=14532d&color=fff&size=200'">
                        <img th:unless="${user.profileImageUrl != null && !user.profileImageUrl.isEmpty()}"
                             th:src="@{https://ui-avatars.com/api/?name=${user.username}&background=14532d&color=fff&size=200}"
                             class="w-full h-full object-cover"
                             alt="Profile">
                    </div>
                </div>

                <!-- Profile Info -->
                <div class="flex-1">
                    <div class="grid sm:grid-cols-2 gap-x-8 gap-y-6">
                        <div>
                            <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Username</label>
                            <p class="mt-1 text-gray-900 font-medium" th:text="${user.username}">-</p>
                        </div>

                        <div>
                            <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Nama Lengkap</label>
                            <p class="mt-1">
                                <span th:if="${user.fullName != null && !user.fullName.isEmpty()}"
                                      class="text-gray-900" th:text="${user.fullName}">-</span>
                                <span th:unless="${user.fullName != null && !user.fullName.isEmpty()}"
                                      class="text-gray-400 italic">Belum diisi</span>
                            </p>
                        </div>

                        <div>
                            <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Email</label>
                            <p class="mt-1">
                                <span th:if="${user.email != null && !user.email.isEmpty()}"
                                      class="text-gray-900" th:text="${user.email}">-</span>
                                <span th:unless="${user.email != null && !user.email.isEmpty()}"
                                      class="text-gray-400 italic">Belum diisi</span>
                            </p>
                        </div>

                        <div>
                            <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">No. Telepon</label>
                            <p class="mt-1">
                                <span th:if="${user.phoneNumber != null && !user.phoneNumber.isEmpty()}"
                                      class="text-gray-900" th:text="${user.phoneNumber}">-</span>
                                <span th:unless="${user.phoneNumber != null && !user.phoneNumber.isEmpty()}"
                                      class="text-gray-400 italic">Belum diisi</span>
                            </p>
                        </div>

                        <div class="sm:col-span-2">
                            <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Alamat</label>
                            <p class="mt-1">
                                <span th:if="${user.address != null && !user.address.isEmpty()}"
                                      class="text-gray-900" th:text="${user.address}">-</span>
                                <span th:unless="${user.address != null && !user.address.isEmpty()}"
                                      class="text-gray-400 italic">Belum diisi</span>
                            </p>
                        </div>

                        <div class="sm:col-span-2">
                            <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Bio</label>
                            <p class="mt-1">
                                <span th:if="${user.bio != null && !user.bio.isEmpty()}"
                                      class="text-gray-900" th:text="${user.bio}">-</span>
                                <span th:unless="${user.bio != null && !user.bio.isEmpty()}"
                                      class="text-gray-400 italic">Belum diisi</span>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="px-8 py-6 bg-gray-50 border-t border-gray-100 flex flex-col sm:flex-row items-start sm:items-center gap-4">
            <a th:href="@{/profile/edit}" class="inline-flex items-center space-x-2 px-6 py-3 bg-amber-500 hover:bg-amber-600 text-white font-medium rounded-xl shadow-sm transition-all duration-200">
                <i data-lucide="pencil" class="w-4 h-4"></i>
                <span>Edit Profile</span>
            </a>
            <a th:href="@{/change-password}" class="inline-flex items-center space-x-2 px-6 py-3 bg-primary-100 hover:bg-primary-200 text-primary-700 font-medium rounded-xl transition-all duration-200">
                <i data-lucide="key-round" class="w-4 h-4"></i>
                <span>Change Password</span>
            </a>
            <a th:href="@{/products}" class="sm:ml-auto inline-flex items-center space-x-2 px-6 py-3 bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium rounded-xl transition-all duration-200">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                <span>Kembali</span>
            </a>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script>
    setTimeout(() => lucide.createIcons(), 100);
</script>
</body>
</html>
