<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Daftar Produk</h2>
        <a th:href="@{/products/new}" class="btn btn-success">+ Tambah Produk</a>
    </div>

    <!-- Search & Filter -->
    <form method="get" th:action="@{/products}" class="row g-2 mb-3">
        <div class="col-md-4">
            <input type="text" name="keyword" class="form-control"
                   placeholder="Cari produk..." th:value="${keyword}">
        </div>

        <div class="col-md-3">
            <select name="category" class="form-select">
                <option value="">Semua Kategori</option>
                <option th:each="c : ${T(com.example.productcrud.model.Category).values()}"
                        th:value="${c}"
                        th:text="${c.displayName}"
                        th:selected="${c == category}">
                </option>
            </select>
        </div>

        <div class="col-md-2">
            <button class="btn btn-primary w-100">Search</button>
        </div>
    </form>

    <!-- Total -->
    <p class="text-muted">
        Total data: <strong th:text="${totalItems}"></strong>
    </p>

    <!-- Table -->
    <div th:if="${!#lists.isEmpty(products)}">
        <table class="table table-striped">
            <thead class="table-dark">
            <tr>
                <th>No</th>
                <th>Nama</th>
                <th>Kategori</th>
                <th>Harga</th>
                <th>Stok</th>
                <th>Status</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p, stat : ${products}">
                <td th:text="${stat.index + 1 + (currentPage * 10)}"></td>
                <td th:text="${p.name}"></td>
                <td th:text="${p.category.displayName}"></td>
                <td th:text="'Rp ' + ${#numbers.formatDecimal(p.price,0,'POINT',0,'COMMA')}"></td>
                <td th:text="${p.stock}"></td>
                <td>
                    <span th:if="${p.active}" class="badge bg-success">Aktif</span>
                    <span th:unless="${p.active}" class="badge bg-danger">Tidak Aktif</span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Empty -->
    <div th:if="${#lists.isEmpty(products)}" class="text-center">
        <p>Belum ada produk</p>
    </div>

    <!-- Pagination -->
    <nav th:if="${totalPages > 1}">
        <ul class="pagination justify-content-center">

            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/products(page=${currentPage-1}, keyword=${keyword}, category=${category})}">
                    Previous
                </a>
            </li>

            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, totalPages-1)}"
                th:classappend="${i == currentPage} ? 'active'">

                <a class="page-link"
                   th:text="${i+1}"
                   th:href="@{/products(page=${i}, keyword=${keyword}, category=${category})}">
                </a>
            </li>

            <li class="page-item"
                th:classappend="${currentPage == totalPages-1} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/products(page=${currentPage+1}, keyword=${keyword}, category=${category})}">
                    Next
                </a>
            </li>

        </ul>
    </nav>

</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
