<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Daftar Produk</h2>
        <a th:href="@{/products/new}" class="btn btn-success">+ Tambah Produk</a>
    </div>

    <!-- Search & Filter -->
    <form method="get" th:action="@{/products}" class="row g-2 mb-3">
        <div class="col-md-4">
            <input type="text" name="keyword" class="form-control"
                   placeholder="Cari produk..." th:value="${keyword}">
        </div>

        <div class="col-md-3">
            <select name="categoryId" class="form-select">
                <option value="">Semua Kategori</option>
                <option th:each="c : ${userCategories}"
                        th:value="${c.id}"
                        th:text="${c.name}"
                        th:selected="${c.id == categoryId}">
                </option>
            </select>
        </div>

        <div class="col-md-2">
            <button class="btn btn-primary w-100">Search</button>
        </div>
        <div class="col-md-1">
            <a th:href="@{/products}" class="btn btn-outline-secondary w-100">Reset</a>
        </div>
    </form>

    <!-- Total -->
    <p class="text-muted">
        Total data: <strong th:text="${totalItems}"></strong>
    </p>

    <!-- Table -->
    <div th:if="${!#lists.isEmpty(products)}">
        <table class="table table-striped">
            <thead class="table-dark">
            <tr>
                <th>No</th>
                <th>Nama</th>
                <th>Kategori</th>
                <th>Harga</th>
                <th>Stok</th>
                <th>Status</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p, stat : ${products}">
                <td th:text="${stat.index + 1 + (currentPage * 10)}"></td>
                <td th:text="${p.name}"></td>
                <td>
                    <span th:if="${p.category != null}"
                          class="badge bg-info"
                          th:text="${p.category.name}">-</span>
                    <span th:unless="${p.category != null}"
                          class="text-muted">-</span>
                </td>
                <td th:text="'Rp ' + ${#numbers.formatDecimal(p.price,0,'POINT',0,'COMMA')}"></td>
                <td th:text="${p.stock}"></td>
                <td>
                    <span th:if="${p.active}" class="badge bg-success">Aktif</span>
                    <span th:unless="${p.active}" class="badge bg-danger">Tidak Aktif</span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Empty -->
    <div th:if="${#lists.isEmpty(products)}" class="text-center py-5">

        <!-- Jika hasil search/filter kosong -->
        <div th:if="${keyword != null or categoryId != null}">
            <p class="text-muted fs-5">
                Tidak ada produk yang sesuai dengan pencarian / filter.
            </p>
        </div>

        <!-- Jika memang belum ada data -->
        <div th:if="${keyword == null and categoryId == null}">
            <p class="text-muted fs-5">Belum ada produk.</p>
            <a th:href="@{/products/new}" class="btn btn-primary">
                Tambah Produk Pertama
            </a>
        </div>

    </div>

    <!-- Pagination -->
    <nav th:if="${totalPages > 1}">
        <ul class="pagination justify-content-center">

            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/products(page=${currentPage-1}, keyword=${keyword}, categoryId=${categoryId})}">
                    Previous
                </a>
            </li>

            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, totalPages-1)}"
                th:classappend="${i == currentPage} ? 'active'">

                <a class="page-link"
                   th:text="${i+1}"
                   th:href="@{/products(page=${i}, keyword=${keyword}, categoryId=${categoryId})}">
                </a>
            </li>

            <li class="page-item"
                th:classappend="${currentPage == totalPages-1} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/products(page=${currentPage+1}, keyword=${keyword}, categoryId=${categoryId})}">
                    Next
                </a>
            </li>

        </ul>
    </nav>

</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
