<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}"></head>
<body class="bg-gray-50 min-h-screen flex flex-col">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex-1 w-full">

    <!-- Header -->
    <div class="mb-8">
        <a th:href="@{/profile}" class="inline-flex items-center space-x-2 text-gray-500 hover:text-primary-700 transition-colors mb-4">
            <i data-lucide="arrow-left" class="w-4 h-4"></i>
            <span class="text-sm font-medium">Kembali ke Profile</span>
        </a>
        <h1 class="text-2xl font-bold text-gray-900 flex items-center space-x-3">
            <i data-lucide="user-pen" class="w-7 h-7 text-primary-700"></i>
            <span>Edit Profile</span>
        </h1>
    </div>

    <!-- Error Message -->
    <div th:if="${error}" class="mb-6 p-4 bg-red-50 border border-red-200 rounded-xl">
        <div class="flex items-center space-x-3">
            <i data-lucide="alert-circle" class="w-5 h-5 text-red-600 flex-shrink-0"></i>
            <p class="text-sm text-red-700" th:text="${error}"></p>
        </div>
    </div>

    <!-- Form Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
        <form th:action="@{/profile/edit}" th:object="${profileRequest}" method="post" class="space-y-6">

            <!-- Profile Image URL -->
            <div>
                <label for="profileImageUrl" class="block text-sm font-medium text-gray-700 mb-2">
                    <i data-lucide="image" class="w-4 h-4 inline mr-1"></i>
                    URL Foto Profile
                </label>
                <input type="url" id="profileImageUrl"
                       th:field="*{profileImageUrl}"
                       placeholder="Masukkan URL gambar (https://...)"
                       class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all duration-200">
                <p class="mt-2 text-sm text-gray-400">Masukkan link gambar dari internet</p>
            </div>

            <!-- Image Preview -->
            <div class="flex justify-center" id="imagePreviewContainer" style="display: none;">
                <div class="w-32 h-32 rounded-2xl overflow-hidden shadow-lg border-4 border-gray-100">
                    <img id="imagePreview" src="" alt="Preview" class="w-full h-full object-cover"
                         onerror="this.src='https://ui-avatars.com/api/?name=U&background=14532d&color=fff&size=200'">
                </div>
            </div>

            <hr class="border-gray-100">

            <!-- Two Column Layout -->
            <div class="grid md:grid-cols-2 gap-6">

                <!-- Full Name -->
                <div>
                    <label for="fullName" class="block text-sm font-medium text-gray-700 mb-2">
                        <i data-lucide="user" class="w-4 h-4 inline mr-1"></i>
                        Nama Lengkap
                    </label>
                    <input type="text" id="fullName"
                           th:field="*{fullName}"
                           placeholder="Masukkan nama lengkap"
                           class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all duration-200">
                </div>

                <!-- Email -->
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                        <i data-lucide="mail" class="w-4 h-4 inline mr-1"></i>
                        Email
                    </label>
                    <input type="email" id="email"
                           th:field="*{email}"
                           placeholder="Masukkan email"
                           class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all duration-200">
                </div>

                <!-- Phone Number -->
                <div>
                    <label for="phoneNumber" class="block text-sm font-medium text-gray-700 mb-2">
                        <i data-lucide="phone" class="w-4 h-4 inline mr-1"></i>
                        No. Telepon
                    </label>
                    <input type="tel" id="phoneNumber"
                           th:field="*{phoneNumber}"
                           placeholder="Masukkan nomor telepon"
                           class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all duration-200">
                </div>

                <!-- Address -->
                <div>
                    <label for="address" class="block text-sm font-medium text-gray-700 mb-2">
                        <i data-lucide="map-pin" class="w-4 h-4 inline mr-1"></i>
                        Alamat
                    </label>
                    <textarea id="address"
                              th:field="*{address}" rows="2"
                              placeholder="Masukkan alamat lengkap"
                              class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all duration-200 resize-none"></textarea>
                </div>

                <!-- Bio -->
                <div class="md:col-span-2">
                    <label for="bio" class="block text-sm font-medium text-gray-700 mb-2">
                        <i data-lucide="message-square" class="w-4 h-4 inline mr-1"></i>
                        Bio
                    </label>
                    <textarea id="bio"
                              th:field="*{bio}" rows="3"
                              placeholder="Ceritakan sedikit tentang diri Anda"
                              class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all duration-200 resize-none"></textarea>
                </div>
            </div>

            <!-- Buttons -->
            <div class="flex items-center space-x-4 pt-4 border-t border-gray-100">
                <button type="submit" class="inline-flex items-center space-x-2 px-6 py-3 bg-primary-700 hover:bg-primary-600 text-white font-medium rounded-xl shadow-sm hover:shadow-md transition-all duration-200">
                    <i data-lucide="save" class="w-5 h-5"></i>
                    <span>Simpan Perubahan</span>
                </button>
                <a th:href="@{/profile}" class="inline-flex items-center space-x-2 px-6 py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium rounded-xl transition-all duration-200">
                    <span>Batal</span>
                </a>
            </div>
        </form>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script>
    setTimeout(() => lucide.createIcons(), 100);

    const profileImageUrlInput = document.getElementById('profileImageUrl');
    const imagePreview = document.getElementById('imagePreview');
    const imagePreviewContainer = document.getElementById('imagePreviewContainer');

    // Show preview on load if URL exists
    if (profileImageUrlInput && profileImageUrlInput.value) {
        imagePreview.src = profileImageUrlInput.value;
        imagePreviewContainer.style.display = 'block';
    }

    // Show preview on input
    if (profileImageUrlInput) {
        profileImageUrlInput.addEventListener('input', function() {
            const url = this.value.trim();
            if (url) {
                imagePreview.src = url;
                imagePreviewContainer.style.display = 'block';
            } else {
                imagePreviewContainer.style.display = 'none';
            }
        });
    }
</script>
</body>
</html>
