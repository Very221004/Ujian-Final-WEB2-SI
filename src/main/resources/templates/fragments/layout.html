<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- Header Fragment -->
<head th:fragment="header">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product CRUD</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            200: '#bbf7d0',
                            300: '#86efac',
                            400: '#4ade80',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                            800: '#166534',
                            900: '#14532d',
                            950: '#052e16',
                        },
                        dark: {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            200: '#e2e8f0',
                            300: '#cbd5e1',
                            400: '#94a3b8',
                            500: '#64748b',
                            600: '#475569',
                            700: '#334155',
                            800: '#1e293b',
                            900: '#0f172a',
                            950: '#020617',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

    <style>
        [x-cloak] { display: none !important; }
        .glass-effect {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .gradient-primary {
            background: linear-gradient(135deg, #14532d 0%, #166534 50%, #15803d 100%);
        }
        .gradient-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.7) 100%);
        }
        .hover-lift {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .hover-lift:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(20, 83, 45, 0.15);
        }
        .sidebar-transition {
            transition: all 0.3s ease-in-out;
        }
    </style>
</head>

<!-- Navbar Fragment -->
<nav th:fragment="navbar" class="gradient-primary sticky top-0 z-50 shadow-xl"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
            <!-- Logo -->
            <a th:href="@{/}" class="flex items-center space-x-3 group">
                <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center group-hover:bg-white/30 transition-all duration-300">
                    <i data-lucide="package" class="w-6 h-6 text-white"></i>
                </div>
                <span class="text-xl font-bold text-white tracking-tight">ProductCRUD</span>
            </a>

            <!-- Mobile Menu Button -->
            <button id="mobile-menu-btn" class="lg:hidden text-white/80 hover:text-white focus:outline-none">
                <i data-lucide="menu" class="w-6 h-6"></i>
            </button>

            <!-- Desktop Navigation -->
            <div class="hidden lg:flex items-center space-x-1">
                <a th:href="@{/}" class="nav-link px-4 py-2 rounded-lg text-white/80 hover:text-white hover:bg-white/10 transition-all duration-200 text-sm font-medium">
                    <span class="flex items-center space-x-2">
                        <i data-lucide="home" class="w-4 h-4"></i>
                        <span>Home</span>
                    </span>
                </a>
                <a th:href="@{/products}" class="nav-link px-4 py-2 rounded-lg text-white/80 hover:text-white hover:bg-white/10 transition-all duration-200 text-sm font-medium">
                    <span class="flex items-center space-x-2">
                        <i data-lucide="shopping-bag" class="w-4 h-4"></i>
                        <span>Products</span>
                    </span>
                </a>
                <a th:href="@{/categories}" class="nav-link px-4 py-2 rounded-lg text-white/80 hover:text-white hover:bg-white/10 transition-all duration-200 text-sm font-medium">
                    <span class="flex items-center space-x-2">
                        <i data-lucide="tags" class="w-4 h-4"></i>
                        <span>Categories</span>
                    </span>
                </a>
                <a th:href="@{/dashboard}" class="nav-link px-4 py-2 rounded-lg text-white/80 hover:text-white hover:bg-white/10 transition-all duration-200 text-sm font-medium">
                    <span class="flex items-center space-x-2">
                        <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
                        <span>Dashboard</span>
                    </span>
                </a>
            </div>

            <!-- User Menu -->
            <div sec:authorize="isAuthenticated()" class="hidden lg:block">
                <div class="relative" id="user-dropdown">
                    <button onclick="toggleDropdown()" class="flex items-center space-x-3 bg-white/10 hover:bg-white/20 rounded-xl px-4 py-2 transition-all duration-200">
                        <div class="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center">
                            <i data-lucide="user" class="w-4 h-4 text-white"></i>
                        </div>
                        <span class="text-sm font-medium text-white" th:text="${#authentication.name}">User</span>
                        <i data-lucide="chevron-down" class="w-4 h-4 text-white/60"></i>
                    </button>

                    <!-- Dropdown Menu -->
                    <div id="dropdown-menu" class="hidden absolute right-0 mt-2 w-56 bg-white rounded-xl shadow-2xl border border-gray-100 overflow-hidden z-50">
                        <div class="p-3 bg-gray-50 border-b border-gray-100">
                            <p class="text-sm font-semibold text-gray-800" th:text="${#authentication.name}">User</p>
                            <p class="text-xs text-gray-500">Member</p>
                        </div>
                        <div class="py-2">
                            <a th:href="@{/profile}" class="flex items-center space-x-3 px-4 py-2.5 text-gray-700 hover:bg-primary-50 hover:text-primary-700 transition-colors">
                                <i data-lucide="user-circle" class="w-4 h-4"></i>
                                <span class="text-sm">Profile</span>
                            </a>
                            <a th:href="@{/change-password}" class="flex items-center space-x-3 px-4 py-2.5 text-gray-700 hover:bg-primary-50 hover:text-primary-700 transition-colors">
                                <i data-lucide="key-round" class="w-4 h-4"></i>
                                <span class="text-sm">Change Password</span>
                            </a>
                        </div>
                        <div class="border-t border-gray-100 py-2">
                            <form th:action="@{/logout}" method="post">
                                <button type="submit" class="flex items-center space-x-3 w-full px-4 py-2.5 text-red-600 hover:bg-red-50 transition-colors">
                                    <i data-lucide="log-out" class="w-4 h-4"></i>
                                    <span class="text-sm">Logout</span>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="hidden lg:hidden bg-primary-950 border-t border-white/10">
        <div class="px-4 py-3 space-y-1">
            <a th:href="@{/}" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-white/80 hover:text-white hover:bg-white/10 transition-colors">
                <i data-lucide="home" class="w-5 h-5"></i>
                <span class="font-medium">Home</span>
            </a>
            <a th:href="@{/products}" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-white/80 hover:text-white hover:bg-white/10 transition-colors">
                <i data-lucide="shopping-bag" class="w-5 h-5"></i>
                <span class="font-medium">Products</span>
            </a>
            <a th:href="@{/categories}" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-white/80 hover:text-white hover:bg-white/10 transition-colors">
                <i data-lucide="tags" class="w-5 h-5"></i>
                <span class="font-medium">Categories</span>
            </a>
            <a th:href="@{/dashboard}" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-white/80 hover:text-white hover:bg-white/10 transition-colors">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                <span class="font-medium">Dashboard</span>
            </a>

            <div sec:authorize="isAuthenticated()" class="pt-3 border-t border-white/10 mt-3">
                <a th:href="@{/profile}" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-white/80 hover:text-white hover:bg-white/10 transition-colors">
                    <i data-lucide="user-circle" class="w-5 h-5"></i>
                    <span class="font-medium">Profile</span>
                </a>
                <a th:href="@{/change-password}" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-white/80 hover:text-white hover:bg-white/10 transition-colors">
                    <i data-lucide="key-round" class="w-5 h-5"></i>
                    <span class="font-medium">Change Password</span>
                </a>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="flex items-center space-x-3 w-full px-4 py-3 rounded-lg text-red-300 hover:text-red-200 hover:bg-red-900/30 transition-colors">
                        <i data-lucide="log-out" class="w-5 h-5"></i>
                        <span class="font-medium">Logout</span>
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>

<!-- Footer Fragment -->
<footer th:fragment="footer" class="bg-dark-900 text-gray-400 mt-auto">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="border-t border-dark-700 pt-8">
            <div class="flex flex-col md:flex-row items-center justify-between space-y-4 md:space-y-0">
                <div class="flex items-center space-x-3">
                    <div class="w-8 h-8 bg-primary-800 rounded-lg flex items-center justify-center">
                        <i data-lucide="package" class="w-4 h-4 text-white"></i>
                    </div>
                    <span class="text-sm font-medium text-gray-300">Product CRUD</span>
                </div>
                <p class="text-sm text-gray-500">
                    Praktikum JPA Fundamentals - 2026
                </p>
            </div>
        </div>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Mobile Menu Toggle
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');

        if (mobileMenuBtn && mobileMenu) {
            mobileMenuBtn.addEventListener('click', () => {
                mobileMenu.classList.toggle('hidden');
            });
        }

        // Dropdown Toggle
        function toggleDropdown() {
            const dropdownMenu = document.getElementById('dropdown-menu');
            if (dropdownMenu) {
                dropdownMenu.classList.toggle('hidden');
            }
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', (e) => {
            const dropdown = document.getElementById('user-dropdown');
            const dropdownMenu = document.getElementById('dropdown-menu');

            if (dropdown && dropdownMenu && !dropdown.contains(e.target)) {
                dropdownMenu.classList.add('hidden');
            }
        });

        // Re-initialize icons after dynamic content
        function refreshIcons() {
            setTimeout(() => lucide.createIcons(), 100);
        }
    </script>
</footer>

</html>
